<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AriaMem Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
        .memory-card { transition: all 0.2s ease; }
        .memory-card:hover { transform: translateY(-2px); }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900">
    <!-- Navigation -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-indigo-600 p-2 rounded-lg text-white">
                        <i data-lucide="brain-circuit"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-slate-800">Aria<span class="text-indigo-600">Mem</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <span id="status-badge" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                        Online
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Stats Overview -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-indigo-50 p-3 rounded-lg text-indigo-600">
                        <i data-lucide="database"></i>
                    </div>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Total Memorias</span>
                </div>
                <div class="text-3xl font-bold text-slate-800" id="stat-total">-</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-emerald-50 p-3 rounded-lg text-emerald-600">
                        <i data-lucide="activity"></i>
                    </div>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Salud del Motor</span>
                </div>
                <div class="text-3xl font-bold text-slate-800">Óptima</div>
            </div>
            <div class="bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
                <div class="flex items-center justify-between mb-4">
                    <div class="bg-amber-50 p-3 rounded-lg text-amber-600">
                        <i data-lucide="zap"></i>
                    </div>
                    <span class="text-xs font-semibold text-slate-400 uppercase tracking-wider">Puerto REST</span>
                </div>
                <div class="text-3xl font-bold text-slate-800">9090</div>
            </div>
        </div>

        <!-- Search Section -->
        <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden mb-8">
            <div class="p-6 border-b border-slate-100">
                <h2 class="text-lg font-semibold text-slate-800 flex items-center gap-2">
                    <i data-lucide="search" class="w-5 h-5 text-indigo-500"></i>
                    Búsqueda Híbrida
                </h2>
                <p class="text-sm text-slate-500 mt-1">Busca memorias usando semántica vectorial y coincidencias léxicas.</p>
            </div>
            <div class="p-6 bg-slate-50/50">
                <div class="flex gap-3">
                    <div class="relative flex-1">
                        <input type="text" id="search-input" placeholder="¿Qué quieres recordar?..." 
                            class="w-full pl-4 pr-10 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <button onclick="performSearch()" id="search-btn"
                        class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-3 rounded-lg font-medium transition-colors flex items-center gap-2">
                        Buscar
                    </button>
                </div>
            </div>
            <div id="search-results" class="divide-y divide-slate-100">
                <!-- Los resultados aparecerán aquí -->
                <div class="p-12 text-center text-slate-400">
                    <i data-lucide="search" class="w-12 h-12 mx-auto mb-4 opacity-20"></i>
                    <p>Ingresa una consulta para buscar en el motor de memoria</p>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();

        async function fetchStats() {
            try {
                const response = await fetch('/stats');
                const data = await response.json();
                document.getElementById('stat-total').innerText = data.total_memories;
            } catch (error) {
                console.error('Error fetching stats:', error);
            }
        }

        async function performSearch() {
            const query = document.getElementById('search-input').value;
            if (!query) return;

            const btn = document.getElementById('search-btn');
            const resultsDiv = document.getElementById('search-results');
            
            btn.disabled = true;
            btn.innerHTML = 'Buscando...';
            resultsDiv.innerHTML = '<div class="p-12 text-center text-slate-400"><div class="animate-spin w-8 h-8 border-4 border-indigo-500 border-t-transparent rounded-full mx-auto mb-4"></div>Cargando resultados...</div>';

            try {
                const response = await fetch('/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query, limit: 10 })
                });
                
                const results = await response.json();
                displayResults(results);
            } catch (error) {
                resultsDiv.innerHTML = `<div class="p-12 text-center text-red-500">Error al realizar la búsqueda: ${error.message}</div>`;
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Buscar';
            }
        }

        function displayResults(results) {
            const resultsDiv = document.getElementById('search-results');
            
            if (results.length === 0) {
                resultsDiv.innerHTML = '<div class="p-12 text-center text-slate-400">No se encontraron memorias relacionadas.</div>';
                return;
            }

            resultsDiv.innerHTML = results.map(res => {
                // Heuristic: If relevance is significantly higher than semantic similarity, it's likely a keyword match
                const isKeywordMatch = res.relevance_score > 0.05 && (res.score < 0.5);
                
                return `
                <div class="p-6 memory-card hover:bg-slate-50">
                    <div class="flex justify-between items-start mb-2">
                        <div class="flex items-center gap-2">
                            <span class="px-2 py-1 bg-indigo-50 text-indigo-700 text-[10px] font-bold uppercase rounded tracking-wider">
                                ${res.type}
                            </span>
                            <span class="text-[10px] text-slate-400 font-mono">${res.id}</span>
                            ${isKeywordMatch ? `
                            <span class="px-2 py-1 bg-amber-50 text-amber-700 text-[10px] font-bold uppercase rounded tracking-wider flex items-center gap-1">
                                <i data-lucide="hash" class="w-2.5 h-2.5"></i> Match Exacto
                            </span>` : ''}
                        </div>
                        <div class="text-[10px] font-semibold text-slate-500 bg-slate-100 px-2 py-1 rounded">
                            Relevancia Combinada: ${res.relevance_score.toFixed(4)}
                        </div>
                    </div>
                    <p class="text-slate-700 leading-relaxed">${res.content}</p>
                    <div class="mt-3 flex items-center gap-4 text-[11px] text-slate-400 font-medium">
                        <span class="flex items-center gap-1">
                            <i data-lucide="share-2" class="w-3 h-3"></i> Fuente: ${res.source}
                        </span>
                        ${res.score > 0 ? `
                        <span class="flex items-center gap-1 text-emerald-600">
                            <i data-lucide="zap" class="w-3 h-3"></i> Similitud Semántica: ${(res.score * 100).toFixed(1)}%
                        </span>` : ''}
                    </div>
                </div>
            `}).join('');
            
            lucide.createIcons();
        }

        // Search on Enter
        document.getElementById('search-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });

        // Initial load
        fetchStats();
        // Refresh stats every 30 seconds
        setInterval(fetchStats, 30000);
    </script>
</body>
</html>
